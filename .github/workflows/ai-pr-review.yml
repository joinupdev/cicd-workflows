name: Reusable AI PR Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gemini/gemini-3-flash"
          config.fallback_models: "gemini/gemini-2.5-flash"
